<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICKCHAT | Solid Messaging</title>
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/nostr-tools/lib/nostr.bundle.js"></script>
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c0392b">
    <link rel="icon" href="assets/icon.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body class="brick-bg">
    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar brick-border">
            <div class="logo">
                <span class="logo-text">BRICK</span><span class="logo-sub">CHAT</span>
            </div>
            
            <button id="btn-login" class="brick-btn primary">Join the Brick</button>
            
            <div id="user-info" class="user-info">
                <div id="connection-status" class="status-offline">Offline</div>
                <div id="user-name" class="user-display">Guest / Not Connected</div>
            </div>
            
            <nav class="channels">
                <div class="nav-label">Public Feed</div>
                <div class="channel-item active">#global</div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content brick-border">
            <header class="main-header">
                <button id="btn-menu-toggle" class="menu-toggle brick-btn sm">☰</button>
                <h2>#global</h2>
            </header>

            <div id="messages-container" class="messages-container">
                <!-- Messages will appear here -->
            </div>

            <footer class="input-area">
                <textarea id="message-input" placeholder="Brick your message here..." disabled></textarea>
                <button id="btn-send" class="brick-btn" disabled>SEND</button>
            </footer>
        </main>

        <!-- Modals -->
        <div id="modal-container" class="modal-overlay hidden">
            <div id="login-modal" class="modal brick-border">
                <h2>Access the Brick</h2>
                
                <div class="auth-section">
                    <div class="form-group">
                        <label>Secret Key (nsec or hex)</label>
                        <input type="password" id="input-key" placeholder="Paste your key here">
                    </div>
                </div>

                <div id="gen-result-area" class="gen-result hidden">
                    <label>Your New Key (Save it!)</label>
                    <div class="key-display-box">
                        <code id="display-nsec"></code>
                    </div>
                    <div class="key-actions">
                        <button id="btn-copy-key" class="brick-btn sm">COPY</button>
                        <button id="btn-download-key" class="brick-btn sm">DOWNLOAD</button>
                    </div>
                </div>

                <p class="hint">No key? <a href="#" id="link-generate">Generate Identity</a></p>

                <div class="modal-actions">
                    <button id="btn-cancel-login" class="brick-btn">Cancel</button>
                    <button id="btn-confirm-login" class="brick-btn primary">Connect</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js" type="module"></script>
</body>
</html>
