<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICKCHAT | Solid Messaging</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c0392b">
    <link rel="icon" href="assets/icon.png">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
</head>
<body class="brick-theme">
    <div id="app" class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar brick-border">
            <header class="sidebar-header">
                <h1>BRICK</h1>
            </header>
            <nav class="sidebar-nav">
                <button id="nav-chat" class="nav-item active">Messages</button>
                <button id="nav-contacts" class="nav-item">Contacts</button>
                <button id="nav-settings" class="nav-item">Settings</button>
            </nav>
            <div class="user-profile brick-border-top">
                <div id="user-avatar" class="avatar"></div>
                <div id="user-info">
                    <span id="user-name">Guest</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header brick-border-bottom">
                <div class="chat-title">
                    <h2 id="active-chat-name">Global Feed</h2>
                    <span id="connection-status" class="status-offline">Offline</span>
                </div>
            </header>

            <div id="messages-container" class="messages-list">
                <!-- Messages will be injected here -->
                <div class="welcome-card brick-border">
                    <h3>Welcome to BrickChat</h3>
                    <p>Secure, modular, and forever yours.</p>
                    <button id="btn-login" class="brick-btn primary">Start Using Brick</button>
                </div>
            </div>

            <footer class="chat-footer brick-border-top">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Type a message..." disabled></textarea>
                    <button id="btn-send" class="brick-btn" disabled>Send</button>
                </div>
            </footer>
        </main>

        <!-- Modals -->
        <div id="modal-container" class="modal-overlay hidden">
            <div id="login-modal" class="modal brick-border">
                <h2>Join BrickChat</h2>
                
                <div class="tabs">
                    <button id="tab-key" class="tab-btn active">Secret Key</button>
                    <button id="tab-email" class="tab-btn">Email & Pass</button>
                </div>

                <div id="section-key" class="auth-section">
                    <div class="form-group">
                        <label>Private Key (nsec or hex)</label>
                        <input type="password" id="input-key" placeholder="Paste your key here">
                        <p class="hint">Don't have one? <a href="#" id="link-generate">Generate new identity</a></p>
                    </div>
                </div>

                <div id="section-email" class="auth-section hidden">
                    <div class="form-group">
                        <label>Email / NIP-05</label>
                        <input type="email" id="input-email" placeholder="user@domain.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="input-password" placeholder="Strong password">
                        <p class="hint">Your key is derived from these two values.</p>
                    </div>
                </div>

                <div class="modal-actions">
                    <button id="btn-cancel-login" class="brick-btn">Cancel</button>
                    <button id="btn-confirm-login" class="brick-btn primary">Connect</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nostr Library -->
    <script src="https://unpkg.com/nostr-tools/lib/nostr.bundle.js"></script>
    <script src="js/app.js" type="module"></script>
</body>
</html>
